<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Microsoft – Iniciar sesión</title>
  <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-dark: #1a1a2e;
      --card-bg: #1e1e2e;
      --card-border: rgba(255,255,255,0.08);
      --input-bg: #2a2a3d;
      --input-border: #555580;
      --input-focus: #0078d4;
      --text-primary: #ffffff;
      --text-secondary: #aaaacc;
      --text-muted: #7777aa;
      --accent-blue: #0078d4;
      --accent-hover: #106ebe;
      --link-color: #4da3e8;
    }

    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      
      background: url('static/55cc8b53-9d90-447b-9da8-b21a1fed4151.png') repeat center center fixed;
      background-size: cover;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }


    .bg-shapes {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .shape {
      position: absolute;
      border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
      opacity: 0.07;
      animation: morph 12s ease-in-out infinite alternate;
    }

    .shape-1 {
      width: 600px;
      height: 600px;
      background: linear-gradient(135deg, #2a4080, #1a2060);
      top: -100px;
      left: -100px;
      animation-delay: 0s;
    }

    .shape-2 {
      width: 500px;
      height: 500px;
      background: linear-gradient(135deg, #203060, #102040);
      bottom: -80px;
      right: -80px;
      animation-delay: -4s;
      border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
    }

    .shape-3 {
      width: 350px;
      height: 350px;
      background: linear-gradient(135deg, #1a3050, #0a1530);
      top: 40%;
      left: 60%;
      animation-delay: -8s;
      border-radius: 50% 50% 30% 70% / 50% 70% 30% 50%;
    }

  
    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: rgba(255,255,255,0.5);
      border-radius: 50%;
      animation: twinkle 3s ease-in-out infinite;
    }

    @keyframes morph {
      0% { border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; transform: rotate(0deg) scale(1); }
      100% { border-radius: 70% 30% 40% 60% / 50% 60% 40% 50%; transform: rotate(15deg) scale(1.05); }
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.9; }
    }

    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }

 
    .login-card {
      position: relative;
      z-index: 10;
      background: rgba(28, 28, 45, 0.85);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 40px 44px 36px;
      width: 100%;
      max-width: 400px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow:
        0 25px 60px rgba(0,0,0,0.5),
        0 0 0 1px rgba(255,255,255,0.04),
        inset 0 1px 0 rgba(255,255,255,0.08);
      animation: fadeSlideUp 0.6s ease both;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }

    .ms-logo {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2px;
      width: 22px;
      height: 22px;
    }

    .ms-logo span {
      display: block;
      border-radius: 1px;
    }

    .ms-logo span:nth-child(1) { background: #f25022; }
    .ms-logo span:nth-child(2) { background: #7fba00; }
    .ms-logo span:nth-child(3) { background: #00a4ef; }
    .ms-logo span:nth-child(4) { background: #ffb900; }

    .logo-text {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.2px;
    }

    
    h1 {
      font-size: 24px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 8px;
      letter-spacing: -0.3px;
    }

    .subtitle {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 28px;
      line-height: 1.4;
    }

  
    .input-group {
      position: relative;
      margin-bottom: 8px;
    }

    .input-group label {
      position: absolute;
      top: 50%;
      left: 14px;
      transform: translateY(-50%);
      font-size: 13px;
      color: var(--text-muted);
      pointer-events: none;
      transition: all 0.2s ease;
      background: transparent;
      padding: 0 2px;
    }

    .input-group input:focus + label,
    .input-group input:not(:placeholder-shown) + label {
      top: 0;
      font-size: 11px;
      color: var(--input-focus);
      background: rgba(28, 28, 45, 0.9);
    }

    .input-group input {
      width: 100%;
      padding: 14px 14px;
      background: rgba(255,255,255,0.04);
      border: 1.5px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .input-group input::placeholder {
      color: transparent;
    }

    .input-group input:focus {
      border-color: var(--input-focus);
      background: rgba(0, 120, 212, 0.05);
      box-shadow: 0 0 0 3px rgba(0, 120, 212, 0.15);
    }

   
    .forgot-link {
      display: inline-block;
      margin: 10px 0 24px;
      font-size: 13px;
      color: var(--link-color);
      text-decoration: none;
      transition: color 0.2s;
    }

    .forgot-link:hover {
      color: #7bbdf5;
      text-decoration: underline;
    }

    .btn-next {
      width: 100%;
      padding: 13px;
      background: var(--accent-blue);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.1s ease, box-shadow 0.2s ease;
      position: relative;
      overflow: hidden;
      letter-spacing: 0.2px;
    }

    .btn-next::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
      background-size: 200% 100%;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .btn-next:hover {
      background: var(--accent-hover);
      box-shadow: 0 4px 20px rgba(0, 120, 212, 0.4);
      transform: translateY(-1px);
    }

    .btn-next:hover::after {
      opacity: 1;
      animation: shimmer 1.2s ease infinite;
    }

    .btn-next:active {
      transform: translateY(0);
      box-shadow: none;
    }

   
    .divider {
      height: 1px;
      background: rgba(255,255,255,0.07);
      margin: 24px 0 20px;
    }

    
    .signup-row {
      text-align: center;
      font-size: 13.5px;
      color: var(--text-secondary);
    }

    .signup-row a {
      color: var(--link-color);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }

    .signup-row a:hover {
      color: #7bbdf5;
      text-decoration: underline;
    }

    
    footer {
      position: relative;
      z-index: 10;
      margin-top: 28px;
      text-align: center;
      animation: fadeSlideUp 0.6s 0.2s ease both;
    }

    .footer-links {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .footer-links a {
      font-size: 12px;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer-links a:hover {
      color: var(--text-secondary);
    }

    .footer-note {
      font-size: 11.5px;
      color: #55557a;
      line-height: 1.5;
    }

    .footer-note a {
      color: var(--link-color);
      text-decoration: none;
    }

    .footer-note a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>


  <div class="bg-shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
  </div>


  <div class="stars" id="stars"></div>

  
  <div class="login-card">
    <div class="logo-area">
      <div class="ms-logo">
        <span></span><span></span>
        <span></span><span></span>
      </div>
      <span class="logo-text">Microsoft</span>
    </div>

    <h1>Iniciar sesión</h1>
    <p class="subtitle">Usar su cuenta de Microsoft.</p>

    <div class="input-group">
      <input type="text" id="email" placeholder=" " autocomplete="off" />
      <label for="email">Correo electrónico o número de teléfono</label>
    </div>

    <a href="#" class="forgot-link">¿Olvidaste tu nombre de usuario?</a>

    <button class="btn-next">Siguiente</button>

    <div class="divider"></div>

    <p class="signup-row">
      ¿Es nuevo en Microsoft? <a href="#">Crear una cuenta</a>
    </p>
  </div>


  <footer>
    <div class="footer-links">
      <a href="#">Términos de uso</a>
      <a href="#">Privacidad y cookies</a>
      <a href="#">Accesibilidad</a>
      <a href="#">Cookies</a>
      <a href="#">Legal</a>
    </div>
    <p class="footer-note">
      Usa la exploración privada si este no es tu dispositivo.
      <a href="#">Más información</a>
    </p>
  </footer>

  <script>
    
    const starsEl = document.getElementById('stars');
    for (let i = 0; i < 80; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      s.style.left = Math.random() * 100 + '%';
      s.style.top = Math.random() * 100 + '%';
      s.style.animationDelay = (Math.random() * 4) + 's';
      s.style.animationDuration = (2 + Math.random() * 3) + 's';
      s.style.opacity = Math.random() * 0.6 + 0.1;
      starsEl.appendChild(s);
    }
  </script>
</body>
</html>
